name: CI

# Builds the AmbiTap-Pd library via CMake on macOS (universal x86_64 + arm64),
# Linux, and Windows (MSVC), and checks the Pd external exports ambitap_setup
# (mac/linux also verify all 16 classes and run a headless load test; Windows
# verifies the DLL exports the entry point). tap/AmbiTap (the submodule) is
# public, so the default GITHUB_TOKEN resolves the recursive checkout.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            ext: pd_darwin
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64;arm64
          - os: ubuntu-latest
            ext: pd_linux
            cmake_args: ""
    steps:
      - name: Checkout (recursive — pulls the AmbiTap submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Eigen (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Install Eigen (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Configure
        env:
          # Passed via env (not direct ${{ }} interpolation) so the ';' in the
          # macOS arch list reaches cmake as one token instead of being parsed
          # as a shell command separator.
          EXTRA_CMAKE_ARGS: ${{ matrix.cmake_args }}
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release $EXTRA_CMAKE_ARGS

      - name: Build
        run: cmake --build build --parallel

      - name: Verify external + all 16 classes
        shell: bash
        run: |
          set -euo pipefail
          LIB="externals/ambitap.${{ matrix.ext }}"
          [ -f "$LIB" ] || { echo "::error::$LIB was not built"; exit 1; }

          # ambitap_setup must be a defined, exported text symbol (Mach-O prefixes
          # C symbols with an underscore; ELF does not).
          nm "$LIB" | grep -Eq ' T _?ambitap_setup$' \
            || { echo "::error::ambitap_setup is not exported"; exit 1; }

          # Count distinct per-class setup symbols (mangled _tilde_setup names).
          n=$(nm "$LIB" | grep -oE 'ambitap_[a-z0-9]+_tilde_setup' | sort -u | wc -l | tr -d ' ')
          echo "class setups: $n"
          [ "$n" -ge 16 ] || { echo "::error::expected >= 16 class setups, got $n"; exit 1; }

          echo "$LIB OK: ambitap_setup exported, $n classes"

      - name: Verify universal (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          LIB=externals/ambitap.pd_darwin
          archs=$(lipo -archs "$LIB")
          echo "archs: $archs"
          [ "$archs" = "x86_64 arm64" ] || { echo "::error::$LIB is not universal (got '$archs')"; exit 1; }

      # Headless load test: actually instantiate every object in Pd (Linux only —
      # puredata-core gives a GUI-less pd; the macOS pd cask is awkward to drive
      # headless in CI). The build/verify steps cover macOS.
      - name: Load smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y puredata-core || sudo apt-get install -y puredata
          tests/load_smoke.sh

      # End-to-end OSC remote-surface test: fire the exact binary OSC the
      # browser widgets emit (via ui/scripts/osc-bridge.mjs) at a headless Pd
      # running the ambitap.ui-remote abstraction and assert the routed
      # ambitap.*~ messages come out of the right outlets.
      - name: OSC remote-surface test (Linux)
        if: runner.os == 'Linux'
        run: tests/osc_remote_test.sh

  # Windows is a separate job: it needs Pd's import library (pd.lib) for MSVC
  # linking and a PE-export check instead of nm, so it doesn't share the matrix.
  windows:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout (recursive — pulls the AmbiTap submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC (cl, link, dumpbin on PATH)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fetch Pd (for pd.lib)
        shell: pwsh
        run: |
          $ver = "0.56-5"
          Invoke-WebRequest "http://msp.ucsd.edu/Software/pd-$ver.msw.zip" -OutFile pd.zip
          Expand-Archive pd.zip -DestinationPath pd-dist -Force
          $lib = (Get-ChildItem -Recurse pd-dist -Filter pd.lib | Select-Object -First 1)
          if (-not $lib) { throw "pd.lib not found in the Pd Windows distribution" }
          "PD_LIB=$($lib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "pd.lib: $($lib.FullName)"

      - name: Configure
        shell: pwsh
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DPD_LIB="$env:PD_LIB"

      - name: Build
        run: cmake --build build --parallel

      - name: Verify DLL exports the entry point
        shell: pwsh
        run: |
          $lib = Get-ChildItem -Recurse externals -Filter ambitap.dll | Select-Object -First 1
          if (-not $lib) { throw "ambitap.dll was not built" }
          Write-Host "built $($lib.FullName)"
          $exports = dumpbin /exports $lib.FullName | Out-String
          if ($exports -notmatch "ambitap_setup") { throw "ambitap_setup is not exported" }
          Write-Host "ambitap.dll OK: ambitap_setup exported"
